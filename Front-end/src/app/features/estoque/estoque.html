<div class="estoque-container">
  <h1>CADASTRO DE PRODUTOS</h1>

  <section class="form-section">
    <div class="form-group">
      <label for="codigo">CÓDIGO (AUTOMÁTICO):</label>
      <input type="text" id="codigo" [(ngModel)]="newProduct.codigo" disabled class="disabled-input">
    </div>

    <div class="form-group">
      <label for="descricao">DESCRIÇÃO:</label>
      <input type="text" id="descricao" [(ngModel)]="newProduct.descricao" appUppercase placeholder="DESCRIÇÃO DO PRODUTO">
    </div>

    <div class="form-group">
      <label for="saldo">SALDO:</label>
      <input type="number" id="saldo" [(ngModel)]="newProduct.saldo" min="0">
    </div>

    <div class="form-group">
      <label for="preco">PREÇO BASE:</label>
      <input type="number" id="preco" [(ngModel)]="newProduct.preco_base" min="0">
    </div>

    <app-service-status-banner 
      style="grid-column: span 2;"
      [isOffline]="hasStockServiceError"
      message="SERVIÇO DE ESTOQUE OFFLINE. AGUARDE A RECONEXÃO PARA SALVAR.">
    </app-service-status-banner>

    <button class="btn-save" [disabled]="hasStockServiceError" (click)="saveProduct()">SALVAR PRODUTO</button>
  </section>

  <hr>

  <section class="list-section">
    <h2>PRODUTOS EM ESTOQUE</h2>
    <table class="table">
      <thead>
        <tr>
          <th>CÓDIGO</th>
          <th>DESCRIÇÃO</th>
          <th>SALDO</th>
          <th>PREÇO BASE</th>
          <th>AÇÕES</th>
        </tr>
      </thead>
      <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.codigo }}</td>
        <td>{{ p.descricao }}</td>
        <td>{{ p.saldo }}</td>
        <td>{{ p.preco_base | currency:'BRL' }}</td>
        <td>
          <button class="btn-adjust" [disabled]="hasStockServiceError" (click)="openAdjustmentModal(p)">AJUSTAR</button>
        </td>
      </tr>
      <tr *ngIf="products.length === 0">
        <td colspan="5" class="empty-msg">Nenhum produto cadastrado.</td>
      </tr>
      </tbody>
      </table>
      </section>

      <!-- Modal de Ajuste de Estoque -->
      <div class="adjustment-modal-overlay" *ngIf="isAdjustmentModalOpen && selectedProduct">
      <div class="adjustment-modal-content">
      <div class="adjustment-modal-header">
      <h2>AJUSTAR ESTOQUE: {{ selectedProduct.codigo }}</h2>
      <button class="btn-close-modal" (click)="closeAdjustmentModal()">X</button>
      </div>
      <div class="adjustment-modal-body">
      <p><strong>PRODUTO:</strong> {{ selectedProduct.descricao }}</p>
      <div class="form-group">
        <label for="newSaldo">NOVO SALDO:</label>
        <input type="number" id="newSaldo" [(ngModel)]="adjustmentValue" min="0">
      </div>
      </div>
      <div class="adjustment-modal-footer">
      <button class="btn-cancel" (click)="closeAdjustmentModal()">CANCELAR</button>
      <button class="btn-save-adjustment" (click)="saveAdjustment()">SALVAR AJUSTE</button>
      </div>
      </div>
      </div>

      <!-- Modal de Feedback -->
      <app-modal 
      ...
    [isOpen]="isModalOpen" 
    [title]="modalTitle" 
    [message]="modalMessage" 
    [type]="modalType" 
    (closeEvent)="closeModal()"
    (confirmEvent)="closeModal()">
  </app-modal>
</div>
