<div class="modal-backdrop" *ngIf="isOpen">
  <div class="modal-container" [ngClass]="type">
    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <p>{{ message }}</p>
    </div>
    <div class="modal-footer">
      <button *ngIf="type === 'confirm'" class="cancel-btn" (click)="onClose()">CANCELAR</button>
      <button class="confirm-btn" (click)="onConfirm()">{{ type === 'confirm' ? 'CONFIRMAR' : 'OK' }}</button>
    </div>
  </div>
</div>
