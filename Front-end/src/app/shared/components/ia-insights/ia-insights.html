<div class="ia-trigger" (click)="toggle()">
  <span class="sparkle">✨</span>
  <span class="label">IA INSIGHTS</span>
</div>

<div class="ia-panel" [class.open]="isOpen">
  <div class="ia-header">
    <h3>✨ ANALISE PREDITIVA (IA)</h3>
    <button class="btn-close" (click)="toggle()">✕</button>
  </div>

  <div class="ia-content">
    <div *ngIf="loading" class="loader">Analisando dados do ERP...</div>
    
    <div *ngIf="!loading && insights.length === 0" class="empty-state">
      Sem novas recomendacoes no momento.
    </div>

    <div *ngFor="let insight of insights" class="insight-card" [ngClass]="insight.prioridade">
      <div class="insight-type">{{ insight.tipo }}</div>
      <div class="insight-msg">{{ insight.mensagem }}</div>
      <div class="insight-action">
        <strong>SUGESTAO:</strong> {{ insight.acao_sugerida }}
      </div>
    </div>
  </div>
</div>
